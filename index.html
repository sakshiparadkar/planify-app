.fg input,.fg textarea,.fg select{width:100%;padding:10px 13px;border:1.5px solid #252525;border-radius:9px;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;color:#e8e4dc;background:#0e0e0e;outline:none;transition:border-color .15s}

.time-picker .tp-clear:hover{color:#ccc;border-color:#444}
.reminder-checks{display:flex;flex-wrap:wrap;gap:7px;margin-top:5px}
.rchk{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:700;padding:6px 12px;border-radius:8px;border:1.5px solid #333;background:#0e0e0e;cursor:pointer;transition:all .15s;color:#ccc8c0}
.rchk.on{background:#081510;border-color:#1a4028;color:#4dd472}
.rchk:hover:not(.on){border-color:#444;color:#fff}

.pri-opt:hover{border-color:#444;color:#fff}
.pri-opt.sel-high{background:#1a0808;border-color:#3a1010;color:#e05050}
.pri-opt.sel-medium{background:#180e00;border-color:#382000;color:#c89020}
.pri-opt.sel-low{background:#081510;border-color:#1a4028;color:#4dd472}
.toast{position:fixed;bottom:1.75rem;left:50%;transform:translateX(-50%) translateY(120px);background:#f0ece4;color:#111;padding:10px 22px;border-radius:30px;font-size:12.5px;font-weight:700;z-index:300;transition:transform .3s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;pointer-events:none;max-width:88vw;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.4)}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.ok{background:#4dd472;color:#04120a}
.toast.err{background:#c04848;color:#fff}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

<body>
<div class="app" id="root"></div>
<div class="toast" id="toastEl"></div>
<script>
const SK='tp8_tasks', TK='tp8_time';
let tasks=[], remindTime='08:00';
let view='list', tab='today', addOpen=false, settOpen=false, editId=null;
let calYear=new Date().getFullYear(), calMonth=new Date().getMonth(), calSel=null, weekSel=null;
const timers={};

function load(){
  try{tasks=JSON.parse(localStorage.getItem(SK)||'[]');}catch(e){tasks=[];}
  remindTime=localStorage.getItem(TK)||'08:00';
}
function save(){
  localStorage.setItem(SK,JSON.stringify(tasks));
  localStorage.setItem(TK,remindTime);
}

const td=()=>{
  const d=new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
};
const h=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
function fmtS(d){return d?new Date(d+'T00:00:00').toLocaleDateString('en-IN',{day:'numeric',month:'short'}):''}
function fmtL(d){return d?new Date(d+'T00:00:00').toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',year:'numeric'}):''}

function to12(t24){
  if(!t24||!t24.includes(':')) return {h:'',m:'00',ap:'AM'};
  const [hh,mm]=t24.split(':').map(Number);
  const ap=hh>=12?'PM':'AM';
  const h12=(hh%12)||12;
  return {h:String(h12), m:String(mm).padStart(2,'0'), ap};
}
function to24(h12,m,ap){
  let hh=parseInt(h12)||0;
  if(ap==='PM'&&hh!==12) hh+=12;
  if(ap==='AM'&&hh===12) hh=0;
  return String(hh).padStart(2,'0')+':'+String(m||'00').padStart(2,'0');
}
function fmt12(t24){
  if(!t24) return '';
  const {h,m,ap}=to12(t24);
  if(!h) return '';
  return h+':'+m+' '+ap;
}

function toast(msg,type=''){
  const t=document.getElementById('toastEl');
  t.textContent=msg;t.className='toast show'+(type?' '+type:'');
  clearTimeout(t._t);t._t=setTimeout(()=>t.className='toast',3200);
}
function expandTask(task, fromDate, toDate){
  if(task.repeat==='none'||!task.repeat){
    if(task.date>=fromDate&&task.date<=toDate) return [{...task,_vid:task.id+'_'+task.date}];
    return [];
  }
  const instances=[];
  let cur=new Date(task.date+'T00:00:00');
  const end=new Date(toDate+'T00:00:00');
  const from=new Date(fromDate+'T00:00:00');
  let safety=0;
  while(cur<=end&&safety<500){
    safety++;
    const ds=cur.toISOString().slice(0,10);
    if(cur>=from){
      const vid=task.id+'_'+ds;
      const done=(task.completedDates||[]).includes(ds);
      instances.push({...task,date:ds,_vid:vid,_done:done,_base:task.id});
    }
    if(task.repeat==='daily') cur.setDate(cur.getDate()+1);
    else if(task.repeat==='weekly') cur.setDate(cur.getDate()+7);
    else break;
  }
  return instances;
}

function getAllForDate(date){
  const all=[];
  tasks.forEach(t=>{
    const instances=expandTask(t,date,date);
    all.push(...instances);
  });
  return all;
}

function getAllForRange(from,to){
  const all=[];
  tasks.forEach(t=>{
    const instances=expandTask(t,from,to);
    all.push(...instances);
  });
  return all;
}
function isInstanceDone(inst){
  if(inst._base){
    const base=tasks.find(t=>t.id===inst._base);
    return base&&(base.completedDates||[]).includes(inst.date);
  }
  return inst.completed||false;
}

function toggleDone(taskId, date){
  const t=tasks.find(t=>t.id===taskId);
  if(!t)return;
  if(t.repeat&&t.repeat!=='none'){
    const arr=t.completedDates||[];
    const idx=arr.indexOf(date);
    if(idx>=0) arr.splice(idx,1);
    else arr.push(date);
    t.completedDates=arr;
  } else {
    t.completed=!t.completed;
  }
  save();render();
}

function getWeekProgress(){
  const now=new Date();
  const dow=now.getDay();
  const monday=new Date(now);monday.setDate(now.getDate()-(dow===0?6:dow-1));
  const days=[];
  for(let i=0;i<7;i++){
    const d=new Date(monday);d.setDate(monday.getDate()+i);
    days.push(d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'));
  }
  const from=days[0],to=days[6];
  const instances=getAllForRange(from,to);
  let done=0,total=0;
  days.forEach(ds=>{
    const dayTasks=instances.filter(t=>t.date===ds);
    total+=dayTasks.length;
    done+=dayTasks.filter(t=>isInstanceDone(t)).length;
  });
  const pct=total===0?0:Math.round(done/total*100);
  return{days,done,total,pct};
}
const canNotif=()=>'Notification' in window;
const isGranted=()=>canNotif()&&Notification.permission==='granted';

function enableNotif(){
  if(!canNotif()){toast('Not supported','err');return;}
  Notification.requestPermission().then(p=>{
    if(p==='granted'){toast('Notifications enabled!','ok');scheduleAll();}
    else if(p==='denied') toast('Blocked — click the lock icon in address bar → Notifications → Allow','err');
    else toast('Please click Allow when the browser asks','');
    render();
  }).catch(()=>toast('Could not request permission','err'));
}

const REMINDER_OFFSETS={'at':0,'10min':10,'1hr':60,'1day':24*60};
const REMINDER_LABELS={'at':'At time','10min':'10 min before','1hr':'1 hr before','1day':'1 day before'};

function fireNotif(task, label){
  if(!isGranted())return;
  new Notification('📋 Task Reminder',{
    body:(label&&label!=='At time'?label+': ':'')+task.title
      +(task.notes?'\n'+task.notes:'')+(task.time?'  ⏰ '+fmt12(task.time):''),
    tag:'t-'+task.id+'-'+label,
    requireInteraction:true
  });
}

function scheduleOne(task){
  if(!isGranted())return;
  Object.keys(timers).filter(k=>k.startsWith(task.id+'-')).forEach(k=>{clearTimeout(timers[k]);delete timers[k];});
  const reminders=task.reminders&&task.reminders.length?task.reminders:['at'];
  const [hh,mm]=(task.time||remindTime).split(':').map(Number);
  reminders.forEach(r=>{
    const offsetMins=REMINDER_OFFSETS[r]||0;
    const fireAt=new Date(task.date+'T00:00:00');
    fireAt.setHours(hh,mm,0,0);
    fireAt.setMinutes(fireAt.getMinutes()-offsetMins);
    const delay=fireAt-Date.now();
    const key=task.id+'-'+r;
    if(delay<=0){
      if(task.date===td()&&!task.notified){fireNotif(task,REMINDER_LABELS[r]);}
      return;
    }
    timers[key]=setTimeout(()=>{
      const t=tasks.find(t=>t.id===task.id);
      if(t&&!t.completed)fireNotif(t,REMINDER_LABELS[r]);
      delete timers[key];
    },delay);
  });
  task.scheduled=true;save();
}

function scheduleAll(){
  tasks.filter(t=>t.date>=td()&&!t.completed).forEach(scheduleOne);
}
function render(){
  const today=td();
  const wp=getWeekProgress();

  let o=`
  <div class="top">
    <div>
      <h1>Daily Planner</h1>
      <div class="dd">${fmtL(today)}</div>
    </div>
    <div class="top-right">
      <div class="view-toggle">
        <button class="vt-btn ${view==='list'?'on':''}" onclick="view='list';render()">List</button>
        <button class="vt-btn ${view==='cal'?'on':''}" onclick="view='cal';render()">Calendar</button>
      </div>
      <button class="btn btn-sm" onclick="settOpen=true;render()" title="Settings">⚙</button>
      <button class="btn btn-sm btn-white" onclick="addOpen=true;editId=null;render()">+ Add Task</button>
    </div>
  </div>`;

  if(!isGranted()){
    o+=`<div class="nbar nbar-off">
      <div><div>🔔 Notifications are off</div><div class="nbar-sub">Enable desktop reminders so you never miss a task</div></div>
      <button class="btn btn-sm btn-white" onclick="enableNotif()">Enable</button>
    </div>`;
  } else {
    o+=`<div class="nbar nbar-on">
      <div><div>🟢 Notifications are active</div><div class="nbar-sub">Default reminder fires at ${fmt12(remindTime)} · multiple offsets supported</div></div>
    </div>`;
  }

  const barW=wp.pct;
  const emoji=wp.pct>=80?'🔥':wp.pct>=50?'💪':'⚡';
  o+=`<div class="week-card">
    <div class="week-top">
      <div>
        <div class="week-label">This Week's Progress</div>
        <div class="week-sub">${wp.done} of ${wp.total} tasks completed</div>
      </div>
      <div style="text-align:right">
        <div class="week-pct">${wp.pct}% ${emoji}</div>
      </div>
    </div>
    <div class="bar-bg"><div class="bar-fill" style="width:${barW}%"></div></div>
    <div class="week-days">`;

  const dayNames=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  wp.days.forEach((ds,i)=>{
    const dayTasks=getAllForRange(ds,ds);
    const hasTasks=dayTasks.length>0;
    const allDone=hasTasks&&dayTasks.every(t=>isInstanceDone(t));
    const isT=ds===today;
    const isSel=ds===weekSel;
    let dotCls='wd-none';
    if(hasTasks) dotCls=allDone?'wd-done':ds<today?'wd-miss':'wd-none';
    o+=`<div class="wd ${isSel?'wd-sel':''}" onclick="weekSel=weekSel==='${ds}'?null:'${ds}';render()">
      <div class="wd-name">${dayNames[i]}</div>
      <div class="wd-dot ${dotCls}${isT?' wd-today':''}">${hasTasks?(allDone?'✓':dayTasks.length):'·'}</div>
    </div>`;
  });
  o+=`</div></div>`;

  if(weekSel){
    const selDayInsts=getAllForDate(weekSel);
    o+=`<div class="week-day-panel">
      <div class="week-day-panel-title">
        <span>📅 ${fmtL(weekSel)}</span>
        <button onclick="weekSel=null;render()">✕ Close</button>
      </div>`;
    if(!selDayInsts.length){
      o+=`<div style="font-size:13px;color:#4a7aa0;text-align:center;padding:14px 0">No tasks this day —
        <button class="btn btn-sm btn-ghost" onclick="addOpen=true;editId=null;render()" style="font-size:12px;color:#6a9ee0">+ Add one</button>
      </div>`;
    } else {
      const pending=selDayInsts.filter(t=>!isInstanceDone(t));
      const done=selDayInsts.filter(t=>isInstanceDone(t));
      if(pending.length){
        if(done.length) o+=`<div class="section-header"><span style="color:#4a7aa0">Pending · ${pending.length}</span><div class="section-line"></div></div>`;
        pending.forEach((inst,i)=>{ o+=renderCard(inst,today,i); });
      }
      if(done.length){
        o+=`<div class="section-header"><span style="color:#4a7aa0">Completed · ${done.length}</span><div class="section-line"></div></div>`;
        done.forEach((inst,i)=>{ o+=renderCard(inst,today,i); });
      }
    }
    o+=`</div>`;
  }

  if(view==='list'){o+=renderList(today);}else{o+=renderCalendar(today);}
  if(addOpen||editId) o+=renderAddModal();
  if(settOpen) o+=renderSettModal();
  document.getElementById('root').innerHTML=o;
  const fi=document.getElementById('f-title');if(fi)fi.focus();
  if(addOpen||editId) restoreReminderToggles();
  if(addOpen||editId) restorePrioritySelect();
}
function renderList(today){
  const todayT=getAllForDate(today);
  const tmrDate=new Date(today+'T00:00:00');
  tmrDate.setDate(tmrDate.getDate()+1);
  const tomorrow=tmrDate.getFullYear()+'-'+String(tmrDate.getMonth()+1).padStart(2,'0')+'-'+String(tmrDate.getDate()).padStart(2,'0');
  const futureEnd=new Date(today+'T00:00:00');
  futureEnd.setMonth(futureEnd.getMonth()+3);
  const futureEndStr=futureEnd.getFullYear()+'-'+String(futureEnd.getMonth()+1).padStart(2,'0')+'-'+String(futureEnd.getDate()).padStart(2,'0');
  const pastStart=new Date(today+'T00:00:00');
  pastStart.setMonth(pastStart.getMonth()-3);
  const pastStartStr=pastStart.getFullYear()+'-'+String(pastStart.getMonth()+1).padStart(2,'0')+'-'+String(pastStart.getDate()).padStart(2,'0');
  const yesterday=new Date(today+'T00:00:00');
  yesterday.setDate(yesterday.getDate()-1);
  const yesterdayStr=yesterday.getFullYear()+'-'+String(yesterday.getMonth()+1).padStart(2,'0')+'-'+String(yesterday.getDate()).padStart(2,'0');
  const upcoming=getAllForRange(tomorrow,futureEndStr).sort((a,b)=>a.date.localeCompare(b.date));
  const past=getAllForRange(pastStartStr,yesterdayStr).sort((a,b)=>b.date.localeCompare(a.date));
  let list=tab==='today'?todayT:tab==='upcoming'?upcoming:tab==='past'?past:
    getAllForRange(pastStartStr,futureEndStr).sort((a,b)=>a.date.localeCompare(b.date));
  let o=`<div class="tabs">
    <button class="tab ${tab==='today'?'on':''}" onclick="tab='today';render()">Today<span class="cnt">${todayT.length}</span></button>
    <button class="tab ${tab==='upcoming'?'on':''}" onclick="tab='upcoming';render()">Upcoming<span class="cnt">${upcoming.length}</span></button>
    <button class="tab ${tab==='past'?'on':''}" onclick="tab='past';render()">Past<span class="cnt">${past.length}</span></button>
    <button class="tab ${tab==='all'?'on':''}" onclick="tab='all';render()">All</button>
  </div>`;
  if(!list.length){
    const msgs={today:['🎉','All clear for today!','Nothing scheduled — add a task to stay on track.'],upcoming:['📅','Nothing upcoming','No tasks scheduled. Plan ahead and add some.'],past:['✅','No past tasks','Completed tasks will appear here.'],all:['📋','No tasks yet','Click "+ Add Task" to create your first one.']};
    const [ico,title,sub]=msgs[tab]||msgs.all;
    return o+`<div class="empty"><div class="empty-ico">${ico}</div><div class="empty-title">${title}</div><p>${sub}</p></div>`;
  }
  const pending=list.filter(t=>!isInstanceDone(t));
  const done=list.filter(t=>isInstanceDone(t));
  o+=`<div class="list">`;
  if(pending.length){
    if(done.length) o+=`<div class="section-header"><span>Pending · ${pending.length}</span><div class="section-line"></div></div>`;
    pending.forEach((inst,i)=>{o+=renderCard(inst,today,i);});
  }
  if(done.length){
    o+=`<div class="section-header"><span>Completed · ${done.length}</span><div class="section-line"></div></div>`;
    done.forEach((inst,i)=>{o+=renderCard(inst,today,i);});
  }
  return o+`</div>`;
}

function renderCard(inst,today,idx=0){
  const done=isInstanceDone(inst);
  const baseId=inst._base||inst.id;
  const isT=inst.date===today,isP=inst.date<today;
  let dateTag='';
  if(isT) dateTag=`<span class="tag t-today">● Today</span>`;
  else if(isP) dateTag=`<span class="tag t-past">📅 ${fmtS(inst.date)}</span>`;
  else dateTag=`<span class="tag t-future">📅 ${fmtS(inst.date)}</span>`;
  const repeatTag=inst.repeat&&inst.repeat!=='none'?`<span class="tag t-repeat">↻ ${inst.repeat}</span>`:'';
  const notifTag=!done&&isGranted()&&inst.date>=today?`<span class="tag t-notif">🔔 ${inst.time?fmt12(inst.time):fmt12(remindTime)}</span>`:'';
  const timeTag=inst.time?`<span class="tag t-time">⏰ ${fmt12(inst.time)}</span>`:'';
  const doneTag=done?`<span class="tag t-done">✓ Done</span>`:'';
  const pri=inst.priority||'medium';
  const priDotCls=pri==='high'?'pri-high':pri==='low'?'pri-low':'pri-medium';
  const priTagCls=pri==='high'?'t-pri-high':pri==='low'?'t-pri-low':'t-pri-med';
  const priLabel=pri==='high'?'🔴 High':pri==='low'?'🟢 Low':'🟡 Medium';
  return `<div class="card ${isT?'is-today':isP?'is-past':''} ${done?'is-done':''}" style="animation-delay:${idx*.04}s">
    <div class="card-inner">
      <div class="card-left">
        <div class="check ${done?'done':''}" onclick="toggleDone('${baseId}','${inst.date}')"></div>
        <div class="card-body">
          <div class="card-top-row">
            <div class="pri-dot ${priDotCls}"></div>
            <div class="ctitle ${done?'done':''}">${h(inst.title)}</div>
          </div>
          ${inst.notes?`<div class="cnote">${h(inst.notes)}</div>`:''}
          <div class="tags">${dateTag}${timeTag}${repeatTag}<span class="tag ${priTagCls}">${priLabel}</span>${doneTag||notifTag}</div>
        </div>
      </div>
      <div class="card-acts">
        <button class="btn btn-sm" onclick="editId='${baseId}';addOpen=false;render()">Edit</button>
        <button class="btn btn-sm btn-red" onclick="if(confirm('Delete this task?')){Object.keys(timers).filter(k=>k.startsWith('${baseId}-')).forEach(k=>{clearTimeout(timers[k]);delete timers[k]});tasks=tasks.filter(t=>t.id!=='${baseId}');save();render()}">Delete</button>
      </div>
    </div>
  </div>`;
}
