<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Planner</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#0a0a0a;color:#e8e4dc;min-height:100vh}
.app{max-width:700px;margin:0 auto;padding:2rem 1.25rem 6rem}
.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem}
.top h1{font-size:2rem;font-weight:800;letter-spacing:-.05em;color:#f0ece4}
.dd{font-size:11px;font-weight:600;color:#e8e4dc;text-transform:uppercase;letter-spacing:.12em;margin-top:5px}
.top-right{display:flex;gap:8px;align-items:center}
.btn{display:inline-flex;align-items:center;gap:5px;padding:9px 16px;border-radius:10px;font-family:'Plus Jakarta Sans',sans-serif;font-size:12.5px;font-weight:700;cursor:pointer;transition:all .15s;border:1.5px solid #2a2a2a;background:#191919;color:#e8e4dc}
.btn:hover{background:#222;border-color:#383838;color:#fff}
.btn:active{transform:scale(.97)}
.btn-sm{padding:7px 13px;font-size:12px;border-radius:8px}
.btn-white{background:#e8e4dc;color:#111;border-color:#e8e4dc}.btn-white:hover{background:#d5d1c9;border-color:#d5d1c9}
.btn-red{background:#1e1010;color:#d06868;border-color:#2e1818}.btn-red:hover{background:#261414;color:#e07878}
.btn-ghost{background:none;border-color:transparent;color:#b0aca4}.btn-ghost:hover{color:#fff;background:#191919}
.btn:disabled{opacity:.3;pointer-events:none}
.view-toggle{display:flex;border:1.5px solid #252525;border-radius:10px;overflow:hidden;background:#141414}
.vt-btn{padding:7px 15px;font-size:12px;font-weight:700;cursor:pointer;border:none;background:none;color:#b0aca4;transition:all .15s;font-family:'Plus Jakarta Sans',sans-serif}
.vt-btn.on{background:#e8e4dc;color:#111}
.vt-btn:hover:not(.on){color:#fff}
.nbar{border-radius:12px;padding:13px 16px;margin-bottom:1.25rem;display:flex;align-items:center;justify-content:space-between;gap:10px;font-size:13px;font-weight:600}
.nbar-off{background:#181300;border:1.5px solid #3a2800;color:#d4a030}
.nbar-on{background:#071410;border:1.5px solid #143322;color:#4dd472}
.nbar-sub{font-size:11px;font-weight:500;margin-top:3px;opacity:.7}
.week-card{background:#131313;border:1.5px solid #252525;border-radius:14px;padding:16px 18px;margin-bottom:1.25rem}
.week-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.week-label{font-size:11px;font-weight:800;color:#e8e4dc;text-transform:uppercase;letter-spacing:.12em}
.week-pct{font-size:1.7rem;font-weight:800;letter-spacing:-.04em;color:#fff}
.week-sub{font-size:12px;color:#ccc8c0;margin-top:2px;font-weight:500}
.bar-bg{background:#202020;border-radius:8px;height:7px;overflow:hidden}
.bar-fill{height:100%;border-radius:8px;background:linear-gradient(90deg,#1e7a3a,#4dd472);transition:width .5s cubic-bezier(.4,0,.2,1)}
.week-days{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-top:12px}
.wd{text-align:center;font-size:10px;font-weight:700}
.wd-name{color:#d0ccc4;margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em}
.wd-dot{width:26px;height:26px;border-radius:50%;margin:0 auto;display:flex;align-items:center;justify-content:center;font-size:9.5px;font-weight:800}
.wd-done{background:#0b1e10;color:#4dd472;border:1.5px solid #1a4028}
.wd-miss{background:#1c0e0e;color:#c06060;border:1.5px solid #2e1818}
.wd-none{background:#252525;color:#ccc8c0;border:1.5px solid #383838}
.wd-today{border-color:#4dd472 !important;box-shadow:0 0 0 2px rgba(77,212,114,.15)}
.wd{cursor:pointer}
.wd:hover .wd-dot{transform:scale(1.12);filter:brightness(1.2)}
.wd-dot{transition:transform .15s,filter .15s}
.wd-sel .wd-dot{box-shadow:0 0 0 3px rgba(106,158,224,.45)!important;border-color:#6a9ee0!important}
.wd-sel .wd-name{color:#6a9ee0}
