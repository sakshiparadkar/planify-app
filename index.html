<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Planner</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#0a0a0a;color:#e8e4dc;min-height:100vh}
.app{max-width:700px;margin:0 auto;padding:2rem 1.25rem 6rem}
.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem}
.top h1{font-size:2rem;font-weight:800;letter-spacing:-.05em;color:#f0ece4}
.dd{font-size:11px;font-weight:600;color:#e8e4dc;text-transform:uppercase;letter-spacing:.12em;margin-top:5px}
.top-right{display:flex;gap:8px;align-items:center}
.btn{display:inline-flex;align-items:center;gap:5px;padding:9px 16px;border-radius:10px;font-family:'Plus Jakarta Sans',sans-serif;font-size:12.5px;font-weight:700;cursor:pointer;transition:all .15s;border:1.5px solid #2a2a2a;background:#191919;color:#e8e4dc}
.btn:hover{background:#222;border-color:#383838;color:#fff}
.btn:active{transform:scale(.97)}
.btn-sm{padding:7px 13px;font-size:12px;border-radius:8px}
.btn-white{background:#e8e4dc;color:#111;border-color:#e8e4dc}.btn-white:hover{background:#d5d1c9;border-color:#d5d1c9}
.btn-red{background:#1e1010;color:#d06868;border-color:#2e1818}.btn-red:hover{background:#261414;color:#e07878}
.btn-ghost{background:none;border-color:transparent;color:#b0aca4}.btn-ghost:hover{color:#fff;background:#191919}
.btn:disabled{opacity:.3;pointer-events:none}
.view-toggle{display:flex;border:1.5px solid #252525;border-radius:10px;overflow:hidden;background:#141414}
.vt-btn{padding:7px 15px;font-size:12px;font-weight:700;cursor:pointer;border:none;background:none;color:#b0aca4;transition:all .15s;font-family:'Plus Jakarta Sans',sans-serif}
.vt-btn.on{background:#e8e4dc;color:#111}
.vt-btn:hover:not(.on){color:#fff}
